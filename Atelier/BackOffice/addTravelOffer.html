<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Travel Offer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">Add a Travel Offer</h3>
                    </div>
                    <div class="card-body">
                        <form id="addTravelOfferForm" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="title" class="form-label">Title:</label>
                                <input type="text" class="form-control" id="title" name="title" 
                                       minlength="3" 
                                       placeholder="Enter title (minimum 3 characters)"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="destination" class="form-label">Destination:</label>
                                <input type="text" class="form-control" id="destination" name="destination" 
                                       pattern="[A-Za-z ]{3,}" 
                                       placeholder="Enter destination (letters only)"
                                       required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="departure_date" class="form-label">Departure Date:</label>
                                    <input type="date" class="form-control" id="departure_date" name="departure_date" 
                                           required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="return_date" class="form-label">Return Date:</label>
                                    <input type="date" class="form-control" id="return_date" name="return_date" 
                                           required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="price" class="form-label">Price:</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="price" name="price" 
                                           step="0.01" min="0" 
                                           placeholder="Enter price (e.g., 999.99)"
                                           required>
                                </div>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="availability" name="availability" checked>
                                <label class="form-check-label" for="availability">Available</label>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Category:</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="">Select a category</option>
                                    <option value="adventure">Adventure</option>
                                    <option value="relaxation">Relaxation</option>
                                    <option value="culture">Culture</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary">Add Offer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('addTravelOfferForm').addEventListener('submit', function(e) {
            const departureDate = new Date(document.getElementById('departure_date').value);
            const returnDate = new Date(document.getElementById('return_date').value);
            
            if (returnDate < departureDate) {
                e.preventDefault();
                alert('Return date must be after departure date');
            }
        });
    </script>
</body>
</html>
